<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bin Generator</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Bin Generator</h1>
      <p class="lead">Parametric STL generator. Enter dimensions, generate, then preview or download.</p>
    </header>

    <section class="controls">
      <div class="field">
        <label for="apiBase">Backend URL</label>
        <input id="apiBase" type="text" value="http://localhost:8080" placeholder="https://your-backend.run.app" />
        <!-- http://localhost:8080 -->
        <!-- https://bin-generator-540296082924.asia-northeast1.run.app -->
      </div>
      <div class="grid-3">
        <div class="field">
          <label for="x">X (mm)</label>
          <input id="x" type="number" step="1" min="1" value="50" />
        </div>
        <div class="field">
          <label for="y">Y (mm)</label>
          <input id="y" type="number" step="1" min="1" value="100" />
        </div>
        <div class="field">
          <label for="h">Height (mm)</label>
          <input id="h" type="number" step="1" min="1" value="30" />
        </div>
      </div>
      <div class="checks">
        <label class="check"><input id="name" type="checkbox" checked /> <span>Named STL file</span></label>
        <label class="check"><input id="cacheBust" type="checkbox" checked /> <span>Cache bust</span></label>
      </div>
      <div class="btn-row">
        <button id="generateBtn" class="primary">Generate</button>
        <button id="resetViewBtn" type="button">Reset View</button>
      </div>
    </section>

    <div class="viewer-container">
      <div id="viewer" class="viewer"></div>
      <div class="viewer-hint">Mouse: rotate · Wheel: zoom · Right-drag: pan · Double-click: fit</div>
      <div id="modelInfo" class="model-info">No model loaded</div>
    </div>

    <section class="download-section">
      <a id="downloadBtn" class="button-link disabled" href="#" download="bin.stl">Download STL</a>
    </section>

    <div id="status" class="status">Ready.</div>
    <div id="requestUrl" class="url-box">Request URL will appear here after Generate.</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="js/viewer.js"></script>
</body>
</html>
