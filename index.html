<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bin Generator</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Bin Generator</h1>
      <p class="lead">Parametric STL generator. Enter dimensions, generate, then preview or download.</p>
    </header>

    <section class="controls">
      <input id="apiBase" type="hidden" />
      <div class="dimensions-row">
        <div class="field field-inline">
          <label for="x">X (mm)</label>
          <input id="x" type="number" step="1" min="1" value="50" />
        </div>
        <div class="field field-inline">
          <label for="y">Y (mm)</label>
          <input id="y" type="number" step="1" min="1" value="100" />
        </div>
        <div class="field field-inline">
          <label for="h">Height (mm)</label>
          <input id="h" type="number" step="1" min="1" value="30" />
        </div>
      </div>
      <div class="controls-actions">
        <div class="btn-row">
          <button id="generateBtn" class="primary">Generate</button>
          <button id="resetViewBtn" type="button">Reset View</button>
        </div>
        <div id="status" class="status status-inline">Ready.</div>
      </div>
    </section>

    <div class="viewer-container">
      <div id="viewer" class="viewer">
        <button id="fitViewBtn" type="button" class="fit-view hidden">Fit to view</button>
      </div>
      <!-- <div class="viewer-hint">Mouse: rotate · Wheel: zoom · Right-drag: pan · Double-click: fit</div> -->
      <div id="modelInfo" class="model-info">No model loaded</div>
    </div>

    <section class="download-section">
      <a id="downloadBtn" class="button-link disabled" href="#" download="bin.stl">Download STL</a>
    </section>

  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="js/viewer.js"></script>
</body>
</html>
