<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bean Bins</title>
  <link rel="stylesheet" href="css/styles.css" />

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <!-- Open Graph (link preview) -->
  <meta property="og:title" content="Bean Bins" />
  <meta property="og:description" content="Generate custom 3D printable bins instantly in your browser." />
  <meta property="og:image" content="https://beanbins.xyz/assets/preview.png" />
  <meta property="og:url" content="https://beanbins.xyz/" />
  <meta property="og:type" content="website" />
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="tabs">
        <button class="tab active" type="button" data-tool="bin">🫘 Bin</button>
        <!-- <button class="tab" type="button" data-tool="connectors" disabled>🔗 Connectors</button> -->
        <!-- <button class="tab" type="button" data-tool="grid">▦ Grid</button> -->
      </div>
      <div class="units">Dimensions (mm)</div>
    </header>

    <section class="controls">
      <input id="apiBase" type="hidden" />
      <div class="dimensions">
        <div class="dimensions-row">
          <label>X <input id="x" type="number" step="1" min="1" value="50" /></label>
          <label>Y <input id="y" type="number" step="1" min="1" value="100" /></label>
          <label>H <input id="h" type="number" step="1" min="1" value="30" /></label>
        </div>
        <div class="field checkbox">
          <label>
            <input id="ears" type="checkbox" unchecked>
            Ears
          </label>
        </div>
      </div>
      <div class="controls-actions">
        <div class="btn-row">
          <button id="generateBtn" class="primary">Generate</button>
          <button id="resetViewBtn" type="button" class="hidden">Reset View</button>
          <a id="downloadBtn" class="button-link disabled" href="#" download="bin.stl">
            <!-- <i data-lucide="cloud-download"></i> STL -->
             Download
          </a>
        </div>
        <div id="status" class="status status-inline">Ready.</div>
      </div>
    </section>

    <div class="viewer-container">
      <div id="viewer" class="viewer">
        <button id="fitViewBtn" type="button" class="fit-view hidden">Fit to view</button>
      </div>
      <!-- <div class="viewer-hint">Mouse: rotate · Wheel: zoom · Right-drag: pan · Double-click: fit</div> -->
      <div id="modelInfo" class="model-info">No model loaded</div>
    </div>

  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="js/viewer.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
<!-- Lucide Icons -->
<script> lucide.createIcons(); </script>
</body>
</html>
